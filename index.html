<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kartenspiel</title>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2064%2064'%3E%3Crect%20width='64'%20height='64'%20rx='14'%20fill='%2317351d'/%3E%3Cg%20transform='translate(10%208)%20rotate(-10%2022%2024)'%3E%3Crect%20x='6'%20y='4'%20width='34'%20height='48'%20rx='6'%20fill='%23ffffff'/%3E%3Crect%20x='9'%20y='7'%20width='28'%20height='42'%20rx='4'%20fill='%231f5a2f'/%3E%3Cpath%20d='M23%2018c-2.7%203.2-5.8%205.5-5.8%208.7%200%202.9%202.2%204.9%205%204.9%201.7%200%203.1-.7%204-1.8.9%201.1%202.3%201.8%204%201.8%202.8%200%205-2%205-4.9%200-3.2-3.1-5.5-5.8-8.7l-3.2-3.7z'%20fill='%23ffffff'/%3E%3C/g%3E%3C/svg%3E">

    <link rel="stylesheet" href="style.css" />
    <script defer src="script.js"></script>
  </head>
  <body>
    <div class="container">
      <h1>Kartenspiel</h1>

      <div class="info">
        <div class="stat-box money">
          <span class="stat-label">Geld</span>
          <span class="stat-value" id="money">100</span>
        </div>

        <div class="stat-box">
          <span class="stat-label">Runde</span>
          <span class="stat-value" id="round">1</span>
        </div>

        <div class="stat-box">
          <span class="stat-label">Einsatz</span>
          <span class="stat-value" id="stake">2€</span>
        </div>

        <button id="new-round-btn" disabled>Neue Runde</button>

        <button id="new-game-btn">Neues Spiel</button>
      </div>

      <div class="table-top">
        <div id="stack" class="stack"></div>

        <div id="slots" class="slots">
          <div class="slot" data-slot="0"></div>
          <div class="slot" data-slot="1"></div>
          <div class="slot" data-slot="2"></div>
        </div>
      </div>

      <div id="center-display" class="center-display">
        <div id="message"></div>
        <div id="center-cards" class="center-cards"></div>
      </div>

      <div id="grid" class="grid"></div>

      <section id="debug-controls" class="debug-controls" hidden>
        <span>Testmodus</span>
      </section>
    </div>

    <canvas id="effects-canvas" aria-hidden="true"></canvas>
    <div id="win-flash-layer" class="win-flash" aria-hidden="true"></div>
    <div id="lose-flash-layer" class="lose-flash" aria-hidden="true"></div>
    <div id="jackpot-spectacle" class="jackpot-spectacle" aria-hidden="true">
      <i class="jackpot-burst"></i><i class="jackpot-burst"></i><i class="jackpot-burst"></i><i class="jackpot-burst"></i>
      <i class="jackpot-burst"></i><i class="jackpot-burst"></i><i class="jackpot-burst"></i><i class="jackpot-burst"></i>
      <b class="jackpot-echo">JACKPOT!</b><b class="jackpot-echo">40€</b><b class="jackpot-echo">JACKPOT!</b>
    </div>
    <div id="win-banner" class="win-banner" aria-hidden="true"></div>
  </body>
</html>
