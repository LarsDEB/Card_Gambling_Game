<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kartenspiel</title>

    <link rel="stylesheet" href="style.css" />
    <script defer src="script.js"></script>
  </head>
  <body>
    <div class="container">
      <h1>Kartenspiel</h1>

      <div class="info">
        <div class="stat-box money">
          <span class="stat-label">Geld</span>
          <span class="stat-value" id="money">100</span>
        </div>

        <div class="stat-box">
          <span class="stat-label">Runde</span>
          <span class="stat-value" id="round">1</span>
        </div>

        <button id="new-round-btn" disabled>Neue Runde</button>

        <button id="new-game-btn">Neues Spiel</button>
      </div>

      <div class="table-top">
        <div id="stack" class="stack"></div>

        <div id="slots" class="slots">
          <div class="slot" data-slot="0"></div>
          <div class="slot" data-slot="1"></div>
          <div class="slot" data-slot="2"></div>
        </div>
      </div>

      <div id="center-display" class="center-display">
        <div id="message"></div>
        <div id="center-cards" class="center-cards"></div>
      </div>

      <div id="grid" class="grid"></div>
    </div>
  </body>
</html>
